files: ^lives/fase01-live-engenharia-de-software-para-cientistas-de-dados/
exclude: |
  (?x)^lives/fase01-live-engenharia-de-software-para-cientistas-de-dados/(
    exercicio\.py
    | notebooks/.*
    | venv/.*
    | artifacts/.*
  )$
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd lives/fase01-live-engenharia-de-software-para-cientistas-de-dados && pytest -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
