# Escopo: roda só nos arquivos .py do pacote (src/ e tests/) desta live.
# Notebooks ficam de fora de propósito (têm "red flags" didáticos).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^fase-01-produtizacao-de-modelos/03-engenharia-software-cientistas-dados/lives/fase01-live-engenharia-de-software-para-cientistas-de-dados/(src|tests)/.*\.py$
      - id: ruff-format
        files: ^fase-01-produtizacao-de-modelos/03-engenharia-software-cientistas-dados/lives/fase01-live-engenharia-de-software-para-cientistas-de-dados/(src|tests)/.*\.py$

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd fase-01-produtizacao-de-modelos/03-engenharia-software-cientistas-dados/lives/fase01-live-engenharia-de-software-para-cientistas-de-dados && pytest -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
