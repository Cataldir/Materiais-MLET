# logstash.conf — Pipeline Logstash para processar logs de ML
# Recebe logs JSON da API via TCP e envia para Elasticsearch

input {
  tcp {
    port => 5044
    codec => json
  }
  beats {
    port => 5045
  }
}

filter {
  # Extrai campos de logs de ML em formato JSON
  if [type] == "ml-prediction" {
    mutate {
      add_field => {
        "[@metadata][target_index]" => "ml-predictions-%{+YYYY.MM.dd}"
      }
    }
    # Converte latência para float
    mutate {
      convert => {
        "latency_ms" => "float"
        "confidence" => "float"
      }
    }
  }

  # Geoip para IPs de clientes (opcional)
  if [client_ip] {
    geoip {
      source => "client_ip"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][target_index]}"
    document_type => "_doc"
  }
  stdout {
    codec => rubydebug
  }
}
