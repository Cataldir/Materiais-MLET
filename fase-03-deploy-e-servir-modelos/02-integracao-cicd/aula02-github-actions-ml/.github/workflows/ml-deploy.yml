# ml-deploy.yml — Workflow para deploy automático de modelos
# Trigger: push na branch main com modelo aprovado

name: ML Deploy

on:
  workflow_run:
    workflows: ["ML Train"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy Modelo
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mlflow boto3 sagemaker

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: metrics/

      - name: Validate model performance
        run: |
          python -c "
          import json, sys
          with open('metrics/eval_metrics.json') as f:
              metrics = json.load(f)
          auc = metrics.get('auc_roc', 0)
          print(f'AUC-ROC: {auc:.4f}')
          if auc < 0.80:
              print('Modelo abaixo do threshold mínimo (0.80). Deploy cancelado.')
              sys.exit(1)
          print('Modelo aprovado para deploy.')
          "

      - name: Deploy to SageMaker
        run: python fase-03-deploy-e-servir-modelos/01-deploy-em-nuvem/aula02-aws-sagemaker/sagemaker_deploy.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
